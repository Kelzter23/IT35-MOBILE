<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Questions - AskAya</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        teal: { 50: '#CCFBF1', 400: '#2DD4BF', 500: '#14B8A6', 600: '#0D9488' },
                        rose: { 50: '#FFE4E6', 400: '#FB7185', 500: '#F43F5E' },
                        stone: { 50: '#FAFAF9', 100: '#F5F5F4', 200: '#E7E5E4', 400: '#A8A29E', 500: '#78716C', 600: '#57534E', 800: '#292524', 900: '#1C1917' }
                    },
                    fontFamily: { 'sans': ['DM Sans', 'sans-serif'], 'display': ['Nunito', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'DM Sans', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Nunito', sans-serif; }
    </style>
</head>
<body class="bg-stone-50">
    <!-- Navigation -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-stone-200 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="ph ph-heart-straight text-teal-500 text-3xl"></i>
                <a href="home.html" class="text-2xl font-display font-bold text-stone-900">AskAya</a>
            </div>
            <div class="hidden md:flex space-x-6">
                <a href="home.html" class="text-stone-700 hover:text-teal-600 font-medium transition-colors">Home</a>
                <a href="ask.html" class="text-stone-700 hover:text-teal-600 font-medium transition-colors">Ask Question</a>
                <a href="faq.html" class="text-stone-700 hover:text-teal-600 font-medium transition-colors">FAQs</a>
                <a href="feed.html" class="text-teal-600 font-bold">My Questions</a>
            </div>
        </div>
    </nav>

    <!-- Session ID Input -->
    <div class="bg-teal-50 border-b border-teal-100">
        <div class="max-w-4xl mx-auto px-6 py-6">
            <div class="flex flex-col md:flex-row items-center gap-4">
                <div class="flex-1">
                    <label class="block text-sm font-bold text-stone-700 mb-2">Enter Your Session Code</label>
                    <input type="text" id="sessionInput" placeholder="Paste your session code here..." class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:border-teal-500 focus:ring-2 focus:ring-teal-200 outline-none" data-testid="session-input">
                </div>
                <button onclick="loadQuestions()" class="bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 px-8 rounded-full mt-6 md:mt-0" data-testid="load-questions-btn">Load Questions</button>
            </div>
        </div>
    </div>

    <!-- Questions Feed -->
    <section class="py-12">
        <div class="max-w-4xl mx-auto px-6">
            <div class="mb-8">
                <h1 class="text-3xl font-display font-bold text-stone-900 mb-2">Your Questions</h1>
                <p class="text-stone-600">Track your submitted questions and answers</p>
            </div>

            <div id="questionsContainer" data-testid="questions-container">
                <div class="bg-white rounded-2xl p-12 text-center">
                    <i class="ph ph-magnifying-glass text-stone-300 text-6xl mb-4"></i>
                    <p class="text-stone-500">Enter your session code above to view your questions</p>
                </div>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script src="js/feed.js"></script>
</body>
</html>
