<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQs - AskAya</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        teal: { 50: '#CCFBF1', 400: '#2DD4BF', 500: '#14B8A6', 600: '#0D9488' },
                        rose: { 50: '#FFE4E6', 400: '#FB7185', 500: '#F43F5E' },
                        stone: { 50: '#FAFAF9', 100: '#F5F5F4', 200: '#E7E5E4', 400: '#A8A29E', 500: '#78716C', 600: '#57534E', 800: '#292524', 900: '#1C1917' }
                    },
                    fontFamily: { 'sans': ['DM Sans', 'sans-serif'], 'display': ['Nunito', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'DM Sans', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Nunito', sans-serif; }
    </style>
</head>
<body class="bg-stone-50">
    <!-- Navigation -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-stone-200 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="ph ph-heart-straight text-teal-500 text-3xl"></i>
                <a href="home.html" class="text-2xl font-display font-bold text-stone-900">AskAya</a>
            </div>
            <div class="hidden md:flex space-x-6">
                <a href="home.html" class="text-stone-700 hover:text-teal-600 font-medium transition-colors">Home</a>
                <a href="ask.html" class="text-stone-700 hover:text-teal-600 font-medium transition-colors">Ask Question</a>
                <a href="faq.html" class="text-teal-600 font-bold">FAQs</a>
                <a href="feed.html" class="text-stone-700 hover:text-teal-600 font-medium transition-colors">My Questions</a>
            </div>
        </div>
    </nav>

    <!-- FAQ Section -->
    <section class="py-12">
        <div class="max-w-4xl mx-auto px-6">
            <div class="mb-8">
                <h1 class="text-3xl md:text-4xl font-display font-bold text-stone-900 mb-2">Frequently Asked Questions</h1>
                <p class="text-stone-600">Find answers to common health questions</p>
            </div>

            <!-- Category Filter -->
            <div class="mb-8">
                <div class="flex flex-wrap gap-3">
                    <button onclick="filterFAQ('all')" class="filter-btn bg-teal-500 text-white px-6 py-2 rounded-full font-medium" data-category="all" data-testid="filter-all">All Topics</button>
                    <button onclick="filterFAQ('puberty')" class="filter-btn bg-stone-100 text-stone-700 hover:bg-stone-200 px-6 py-2 rounded-full font-medium" data-category="puberty" data-testid="filter-puberty">Puberty</button>
                    <button onclick="filterFAQ('menstruation')" class="filter-btn bg-stone-100 text-stone-700 hover:bg-stone-200 px-6 py-2 rounded-full font-medium" data-category="menstruation" data-testid="filter-menstruation">Menstruation</button>
                    <button onclick="filterFAQ('contraception')" class="filter-btn bg-stone-100 text-stone-700 hover:bg-stone-200 px-6 py-2 rounded-full font-medium" data-category="contraception" data-testid="filter-contraception">Contraception</button>
                    <button onclick="filterFAQ('mental-health')" class="filter-btn bg-stone-100 text-stone-700 hover:bg-stone-200 px-6 py-2 rounded-full font-medium" data-category="mental-health" data-testid="filter-mental-health">Mental Health</button>
                </div>
            </div>

            <div id="faqContainer" class="space-y-4" data-testid="faq-container">
                <div class="bg-white rounded-2xl p-12 text-center">
                    <i class="ph ph-spinner text-teal-500 text-6xl mb-4 animate-spin"></i>
                    <p class="text-stone-500">Loading FAQs...</p>
                </div>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script src="js/faq.js"></script>
</body>
</html>
