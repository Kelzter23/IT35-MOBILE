<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Worker Dashboard - AskAya</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        teal: { 50: '#CCFBF1', 400: '#2DD4BF', 500: '#14B8A6', 600: '#0D9488' },
                        rose: { 50: '#FFE4E6', 400: '#FB7185', 500: '#F43F5E' },
                        stone: { 50: '#FAFAF9', 100: '#F5F5F4', 200: '#E7E5E4', 400: '#A8A29E', 500: '#78716C', 600: '#57534E', 800: '#292524', 900: '#1C1917' }
                    },
                    fontFamily: { 'sans': ['DM Sans', 'sans-serif'], 'display': ['Nunito', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'DM Sans', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Nunito', sans-serif; }
    </style>
</head>
<body class="bg-stone-50">
    <!-- Navigation -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-stone-200 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="ph ph-heart-straight text-teal-500 text-3xl"></i>
                <a href="home.html" class="text-2xl font-display font-bold text-stone-900">AskAya</a>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-sm text-stone-600">Welcome, <strong id="workerName" data-testid="worker-name">Loading...</strong></span>
                <button onclick="logout()" class="text-sm bg-stone-200 hover:bg-stone-300 text-stone-700 px-4 py-2 rounded-full" data-testid="logout-btn">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Dashboard Content -->
    <section class="py-12">
        <div class="max-w-6xl mx-auto px-6">
            <div class="mb-8">
                <h1 class="text-3xl font-display font-bold text-stone-900 mb-2">Pending Questions</h1>
                <p class="text-stone-600">Help teens by answering their health questions</p>
            </div>

            <div id="questionsContainer" class="space-y-6" data-testid="questions-container">
                <div class="bg-white rounded-2xl p-12 text-center">
                    <i class="ph ph-spinner text-teal-500 text-6xl mb-4 animate-spin"></i>
                    <p class="text-stone-500">Loading questions...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Answer Modal -->
    <div id="answerModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-6" data-testid="answer-modal">
        <div class="bg-white rounded-2xl max-w-2xl w-full p-8 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-start mb-6">
                <h2 class="text-2xl font-display font-bold text-stone-900">Answer Question</h2>
                <button onclick="closeAnswerModal()" class="text-stone-400 hover:text-stone-600" data-testid="close-modal-btn">
                    <i class="ph ph-x text-2xl"></i>
                </button>
            </div>

            <div class="mb-6">
                <div class="bg-stone-50 rounded-xl p-4 mb-4">
                    <p class="text-xs text-stone-500 mb-2" id="modalCategory"></p>
                    <p class="text-stone-800" id="modalQuestion"></p>
                </div>
            </div>

            <form id="answerForm" data-testid="answer-form">
                <input type="hidden" id="questionId">
                <div class="mb-6">
                    <label class="block text-sm font-bold text-stone-700 mb-2">Your Answer</label>
                    <textarea id="answerContent" rows="8" class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:border-teal-500 focus:ring-2 focus:ring-teal-200 outline-none resize-none" placeholder="Provide a helpful, accurate, and empathetic answer..." required data-testid="answer-textarea"></textarea>
                </div>
                <button type="submit" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 rounded-full" data-testid="submit-answer-btn">Submit Answer</button>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/worker-dashboard.js"></script>
</body>
</html>
