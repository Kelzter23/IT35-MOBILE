<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - AskAya</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        teal: { 50: '#CCFBF1', 400: '#2DD4BF', 500: '#14B8A6', 600: '#0D9488' },
                        rose: { 50: '#FFE4E6', 400: '#FB7185', 500: '#F43F5E' },
                        stone: { 50: '#FAFAF9', 100: '#F5F5F4', 200: '#E7E5E4', 400: '#A8A29E', 500: '#78716C', 600: '#57534E', 800: '#292524', 900: '#1C1917' }
                    },
                    fontFamily: { 'sans': ['DM Sans', 'sans-serif'], 'display': ['Nunito', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'DM Sans', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Nunito', sans-serif; }
    </style>
</head>
<body class="bg-stone-50">
    <!-- Navigation -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-stone-200 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="ph ph-heart-straight text-teal-500 text-3xl"></i>
                <a href="home.html" class="text-2xl font-display font-bold text-stone-900">AskAya Admin</a>
            </div>
        </div>
    </nav>

    <!-- Analytics Section -->
    <section class="py-12">
        <div class="max-w-6xl mx-auto px-6">
            <h1 class="text-3xl font-display font-bold text-stone-900 mb-8">Platform Analytics</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12" id="analyticsCards" data-testid="analytics-cards">
                <div class="bg-white rounded-2xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-2">
                        <p class="text-sm text-stone-500">Total Questions</p>
                        <i class="ph ph-question text-teal-500 text-2xl"></i>
                    </div>
                    <p class="text-3xl font-bold text-stone-900" id="totalQuestions" data-testid="total-questions">-</p>
                </div>
                <div class="bg-white rounded-2xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-2">
                        <p class="text-sm text-stone-500">Answered</p>
                        <i class="ph ph-check-circle text-green-500 text-2xl"></i>
                    </div>
                    <p class="text-3xl font-bold text-stone-900" id="answeredQuestions" data-testid="answered-questions">-</p>
                </div>
                <div class="bg-white rounded-2xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-2">
                        <p class="text-sm text-stone-500">Active Workers</p>
                        <i class="ph ph-users text-teal-500 text-2xl"></i>
                    </div>
                    <p class="text-3xl font-bold text-stone-900" id="totalWorkers" data-testid="total-workers">-</p>
                </div>
                <div class="bg-white rounded-2xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-2">
                        <p class="text-sm text-stone-500">Pending Approval</p>
                        <i class="ph ph-clock text-rose-400 text-2xl"></i>
                    </div>
                    <p class="text-3xl font-bold text-stone-900" id="pendingWorkers" data-testid="pending-workers">-</p>
                </div>
            </div>

            <!-- Pending Workers Section -->
            <div class="mb-8">
                <h2 class="text-2xl font-display font-bold text-stone-900 mb-4">Pending Health Worker Applications</h2>
                <div id="pendingWorkersContainer" class="space-y-4" data-testid="pending-workers-container">
                    <div class="bg-white rounded-2xl p-12 text-center">
                        <i class="ph ph-spinner text-teal-500 text-6xl mb-4 animate-spin"></i>
                        <p class="text-stone-500">Loading applications...</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
    <script src="js/admin-dashboard.js"></script>
</body>
</html>
