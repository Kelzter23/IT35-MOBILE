<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Worker Login - AskAya</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        teal: { 50: '#CCFBF1', 400: '#2DD4BF', 500: '#14B8A6', 600: '#0D9488' },
                        rose: { 50: '#FFE4E6', 400: '#FB7185', 500: '#F43F5E' },
                        stone: { 50: '#FAFAF9', 100: '#F5F5F4', 200: '#E7E5E4', 400: '#A8A29E', 500: '#78716C', 600: '#57534E', 800: '#292524', 900: '#1C1917' }
                    },
                    fontFamily: { 'sans': ['DM Sans', 'sans-serif'], 'display': ['Nunito', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'DM Sans', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Nunito', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-teal-50 to-rose-50 min-h-screen">
    <div class="py-12 px-6">
        <div class="max-w-md mx-auto">
            <div class="text-center mb-6">
                <a href="home.html" class="inline-flex items-center space-x-2 mb-4">
                    <i class="ph ph-heart-straight text-teal-500 text-3xl"></i>
                    <span class="text-2xl font-display font-bold text-stone-900">AskAya</span>
                </a>
            </div>

            <div class="bg-white rounded-2xl shadow-xl p-8">
                <div class="mb-6">
                    <h1 class="text-2xl font-display font-bold text-stone-900 mb-2">Health Worker Login</h1>
                    <p class="text-sm text-stone-600">Sign in to answer teen health questions</p>
                </div>

                <form id="loginForm" class="space-y-4" data-testid="login-form">
                    <div>
                        <label class="block text-sm font-bold text-stone-700 mb-2">Email</label>
                        <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:border-teal-500 focus:ring-2 focus:ring-teal-200 outline-none" placeholder="your@email.com" data-testid="email-input">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-stone-700 mb-2">Password</label>
                        <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:border-teal-500 focus:ring-2 focus:ring-teal-200 outline-none" placeholder="Enter password" data-testid="password-input">
                    </div>

                    <button type="submit" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 rounded-full transition-all" data-testid="submit-login-btn">Login</button>
                </form>

                <div id="errorMessage" class="hidden mt-4 bg-red-50 border border-red-200 rounded-xl p-4" data-testid="error-message">
                    <p class="text-sm text-red-700"></p>
                </div>

                <div class="mt-6 text-center">
                    <p class="text-sm text-stone-600">Not registered yet? <a href="worker-register.html" class="text-teal-600 font-bold hover:underline">Apply here</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/worker-login.js"></script>
</body>
</html>
